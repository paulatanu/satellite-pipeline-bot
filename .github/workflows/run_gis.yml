name: Weekly Change Detection
on:
  schedule:
    - cron: '0 0 * * 0' # Every Sunday
  workflow_dispatch:   # Allows manual run

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install earthengine-api gspread
      - name: Execute Script
        env:
          EE_KEY: ${{ secrets.EARTH_ENGINE_KEY }}
        run: python change_detection.py
